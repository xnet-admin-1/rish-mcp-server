name: Build and Release

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Get version
        id: ver
        run: |
          VER="${GITHUB_REF_NAME:-$(git rev-parse --short HEAD)}"
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "VERSION=$VER" >> $GITHUB_ENV
      
      - name: Build package
        run: |
          # Create package directory with proper structure
          mkdir -p pkg/src
          
          # Copy source files
          cp src/*.py pkg/src/
          cp requirements.txt pkg/
          cp README.md pkg/
          cp LICENSE pkg/
          cp setup.py pkg/
          cp pyproject.toml pkg/
          
          # Copy package.json to root of zip
          cp package.json pkg/
          
          # Create the ZIP with files at root level
          cd pkg && zip -r ../rish-mcp-server.zip . && cd ..
          
          echo "Package contents:"
          unzip -l rish-mcp-server.zip | head -20
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rish-mcp-server
          path: rish-mcp-server.zip
      
      - name: Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: rish-mcp-server.zip
          body: |
            ## Rish MCP Server ${{ steps.ver.outputs.version }}
            
            MCP server for Android system access via Shizuku.
            
            ### Credits
            - **Organization:** XNet Inc. https://xnet.ngo
            - **Author:** Josh Fordyce <admin@xnet.ngo>
            - **License:** GPL-3.0
            
            ### Installation for Operit
            Download `rish-mcp-server.zip` and import directly.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Latest Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: Latest Build
          files: rish-mcp-server.zip
          body: |
            ## Latest Development Build
            
            Automatically built from main branch.
            
            ### Credits
            - **Organization:** XNet Inc. https://xnet.ngo
            - **Author:** Josh Fordyce <admin@xnet.ngo>
            - **License:** GPL-3.0
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
