name: Build Package

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Version
        id: ver
        run: |
          VER='${GITHUB_REF_NAME:-$(git rev-parse --short HEAD)}'
          echo "version=$VER" >> $GITHUB_OUTPUT
      
      - name: Build
        run: |
          mkdir -p pkg/src
          cp src/*.py pkg/src/
          cp requirements.txt pkg/
          echo '{"name":"rish-mcp-server","version":"'${{ steps.ver.outputs.version }}'","main":"src/server_direct.py"}' > pkg/package.json
          cd pkg && zip -r ../rish-mcp-server.zip . && cd ..
      
      - uses: actions/upload-artifact@v4
        with:
          name: package
          path: '*.zip'
