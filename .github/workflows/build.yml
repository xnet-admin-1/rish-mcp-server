name: Build and Release

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Get version
        id: ver
        run: |
          VER="${GITHUB_REF_NAME:-$(git rev-parse --short HEAD)}"
          echo "version=$VER" >> $GITHUB_OUTPUT
      
      - name: Build package
        run: |
          mkdir -p pkg/src
          cp src/*.py pkg/src/
          cp requirements.txt pkg/
          cp setup.py pkg/
          cp pyproject.toml pkg/
          cp README.md pkg/
          cp LICENSE pkg/
          cp package.json pkg/
          cd pkg && zip -r ../rish-mcp-server.zip . && cd ..
      
      - uses: actions/upload-artifact@v4
        with:
          name: rish-mcp-server
          path: rish-mcp-server.zip
      
      - name: Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: rish-mcp-server.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Latest Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: Latest Build
          files: rish-mcp-server.zip
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
