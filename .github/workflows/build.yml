name: Build and Release

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Get version
        id: ver
        run: |
          VER="${GITHUB_REF_NAME:-$(git rev-parse --short HEAD)}"
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "VERSION=$VER" >> $GITHUB_ENV
      
      - name: Build package
        run: |
          mkdir -p pkg
          # Copy main server to root for Operit compatibility
          cp src/server_direct.py pkg/
          # Also keep src/ as package
          mkdir -p pkg/src
          cp src/*.py pkg/src/
          cp requirements.txt pkg/
          cp setup.py pkg/
          cp pyproject.toml pkg/
          cp README.md pkg/
          cp LICENSE pkg/
          
          cat > pkg/package.json <<'JSON'
          {
            "name": "rish-mcp-server",
            "version": "${{ steps.ver.outputs.version }}",
            "description": "MCP server for Android system access via Shizuku",
            "author": "Josh Fordyce <admin@xnet.ngo>",
            "organization": "XNet Inc. https://xnet.ngo",
            "license": "GPL-3.0",
            "main": "server_direct.py",
            "entrypoint": "python3 server_direct.py"
          }
          JSON
          
          # Fix import in root-level server_direct.py
          sed -i 's/^from mcp/from mcp/' pkg/server_direct.py
          
          cd pkg && zip -r ../rish-mcp-server.zip . && cd ..
          ls -lh rish-mcp-server.zip
          unzip -l rish-mcp-server.zip
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rish-mcp-server
          path: rish-mcp-server.zip
      
      - name: Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: rish-mcp-server.zip
          body: |
            ## Rish MCP Server ${{ steps.ver.outputs.version }}
            
            MCP server for Android system access via Shizuku.
            
            ### Credits
            - **Organization:** XNet Inc. https://xnet.ngo
            - **Author:** Josh Fordyce <admin@xnet.ngo>
            - **License:** GPL-3.0
            
            ### Installation for Operit
            Download `rish-mcp-server.zip` and import directly.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Latest Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: Latest Build
          files: rish-mcp-server.zip
          body: |
            ## Latest Development Build
            
            Automatically built from main branch.
            
            ### Credits
            - **Organization:** XNet Inc. https://xnet.ngo
            - **Author:** Josh Fordyce <admin@xnet.ngo>
            - **License:** GPL-3.0
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
